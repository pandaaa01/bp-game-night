services:
  - type: web
    name: drawbattle
    runtime: node
    plan: free
    buildCommand: cd client && npm install && npm run build && cd .. && cp -r client/dist server/public && cd server && npm install
    startCommand: cd server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        value: "*"
